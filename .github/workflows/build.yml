name: build

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bun
        uses: oven-sh/setup-bun@v2
      
      - name: Deps
        run: bun install
      
      - name: Build
        run: bun run build
      
      - name: Artifact
        if: github.ref == "refs/heads/master"
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: dist/
