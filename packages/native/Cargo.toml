[package]
name = "extendify-native"
version = "0.0.1"
edition = "2024"

[lib]
name = "extendify_native"
crate-type = ["cdylib"]

[target.'cfg(windows)'.dependencies]
slim-detours-sys = "0"

[target.'cfg(windows)'.dependencies.windows-sys]
version = "0"
features = [
    "Win32",
    "Win32_Security",
    "Win32_System",
    "Win32_System_SystemServices",
    "Win32_System_LibraryLoader",
]

[dependencies]
reqwest = { workspace = true, features = ["blocking"] }

[build-dependencies]
bindgen = "0"
